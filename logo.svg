  <rect x="165" y="110" width="170" height="170" rx="12" fill="none" stroke="#74ACDF" stroke-width="5" filter="url(#glow)"/>
  <rect x="169" y="114" width="162" height="162" rx="9"  fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>

