    <rect x="209" y="100" width="10" height="10" rx="2"/>
    <rect x="233" y="100" width="10" height="10" rx="2"/>
    <rect x="257" y="100" width="10" height="10" rx="2"/>
    <rect x="281" y="100" width="10" height="10" rx="2"/>
    <rect x="306" y="100" width="10" height="10" rx="2"/>
