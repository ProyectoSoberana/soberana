    <line x1="189" y1="290" x2="189" y2="360"/>
    <line x1="214" y1="290" x2="214" y2="360"/>
    <line x1="238" y1="290" x2="238" y2="360"/>
    <line x1="262" y1="290" x2="262" y2="360"/>
    <line x1="286" y1="290" x2="286" y2="360"/>
    <line x1="311" y1="290" x2="311" y2="360"/>
