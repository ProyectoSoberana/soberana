<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 500 350">
  <defs>
    <clipPath id="chip">
      <rect x="165" y="110" width="170" height="170" rx="12"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#0d1b2a"/>

  <!-- ═══ TRAZAS IZQUIERDA ═══ -->
  <!-- 1, 2, 5, 6 → celeste -->
  <g stroke="#74ACDF" stroke-width="2" fill="none" opacity="0.85">
    <line x1="80" y1="134" x2="156" y2="134"/>
    <line x1="80" y1="159" x2="156" y2="159"/>
    <line x1="80" y1="231" x2="156" y2="231"/>
    <line x1="80" y1="256" x2="156" y2="256"/>
  </g>
  <!-- 3, 4 → blanco -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.85">
    <line x1="80" y1="183" x2="156" y2="183"/>
    <line x1="80" y1="207" x2="156" y2="207"/>
  </g>

  <!-- ═══ TRAZAS DERECHA ═══ -->
  <!-- 1, 2, 5, 6 → celeste -->
  <g stroke="#74ACDF" stroke-width="2" fill="none" opacity="0.85">
    <line x1="344" y1="134" x2="420" y2="134"/>
    <line x1="344" y1="159" x2="420" y2="159"/>
    <line x1="344" y1="231" x2="420" y2="231"/>
    <line x1="344" y1="256" x2="420" y2="256"/>
  </g>
  <!-- 3, 4 → blanco -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.85">
    <line x1="344" y1="183" x2="420" y2="183"/>
    <line x1="344" y1="207" x2="420" y2="207"/>
  </g>

  <!-- ═══ TRAZAS ARRIBA (6 pines) ═══ -->
  <g stroke="#74ACDF" stroke-width="2" fill="none" opacity="0.85">
    <line x1="189" y1="50" x2="189" y2="100"/>
    <line x1="214" y1="50" x2="214" y2="100"/>
    <line x1="238" y1="50" x2="238" y2="100"/>
    <line x1="262" y1="50" x2="262" y2="100"/>
    <line x1="286" y1="50" x2="286" y2="100"/>
    <line x1="311" y1="50" x2="311" y2="100"/>
  </g>

  <!-- ═══ TRAZAS ABAJO (6 pines) ═══ -->
