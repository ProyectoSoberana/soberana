      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(168.75)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(191.25)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(213.75)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(236.25)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(258.75)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(281.25)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(303.75)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(326.25)"/>
      <path d="M 0,-10 C -2,-13 -1,-16 0,-17 C 1,-16 2,-13 0,-10 Z" transform="rotate(348.75)"/>
